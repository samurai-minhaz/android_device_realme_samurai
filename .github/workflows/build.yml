name: AI Cloud ROM Builder
on:
  repository_dispatch:
    types: [start-build] # অ্যাপ থেকে এই সিগন্যাল আসবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Triggering Cirrus CI
        run: |
          echo "Requesting Cloud Build for Samurai..."
          
          # Cirrus CI API কল করার কমান্ড
          curl -X POST "https://api.cirrus-ci.com/graphql" \
          -H "Authorization: Bearer ${{ secrets.CIRRUS_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "query": "mutation { createBuild(input: {repositoryId: \"'${{ secrets.CIRRUS_REPO_ID }}'\", branch: \"main\"}) { build { id } } }"
          }'
