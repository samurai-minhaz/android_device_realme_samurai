task:
  name: "ROM Build for Samurai (Realme X2 Pro)"
  timeout_in: 120m
  container:
    image: aospa/aospa:latest
    cpu: 8
    memory: 32G

  # এনভায়রনমেন্ট ভেরিয়েবল
  env:
    CIRRUS_WORKING_DIR: "/tmp/rom"
    DEVICE: "samurai"
    LUNCH_COMBO: "evolution_samurai-userdebug" # আপনার রমের লাঞ্চ কমান্ড অনুযায়ী ঠিক আছে

  # বিল্ড স্ক্রিপ্ট
  build_script:
    - echo "Cleaning up space..."
    - rm -rf /tmp/rom && mkdir -p /tmp/rom
    - cd /tmp/rom
    
    - echo "Syncing ROM source..."
    - repo init -u https://github.com/Evolution-X/manifest -b udc 
    - repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
    
    - echo "Cloning Device, Vendor, and Kernel trees..."
    # আপনি যেহেতু ব্রাঞ্চ রিনেম করেছেন, তাই এখানে ব্রাঞ্চ 'main' করে দেওয়া হয়েছে
    - git clone https://github.com/samurai-minhaz/android_device_realme_samurai -b main device/realme/samurai
    - git clone https://github.com/samurai-minhaz/proprietary_vendor_realme_samurai -b main vendor/realme/samurai
    - git clone https://github.com/samurai-minhaz/android_kernel_realme_sm8150 -b main kernel/realme/samurai

    - echo "Starting the build process..."
    - source build/envsetup.sh
    - lunch $LUNCH_COMBO
    - mka evolution -j$(nproc --all) # Evolution X এর জন্য সাধারণত mka evolution ব্যবহার হয়

  # বিল্ড শেষে ফাইল আপলোড করার জন্য
  upload_artifacts:
    path: "out/target/product/samurai/*.zip"
